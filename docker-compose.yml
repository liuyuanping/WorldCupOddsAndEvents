version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - OEC_DATABASE_URL=sqlite+aiosqlite:///./data/odds_events.db
      - OEC_DEBUG=true
      - OEC_CORS_ORIGINS=["http://localhost:5173"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
